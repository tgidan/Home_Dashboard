<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinci Dash</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/clock.css">
  <link rel="stylesheet" href="css/weather.css">
  <link rel="stylesheet" href="css/news.css">
</head>
<body>
<div id="app">

  <!-- ── Header: clock + weather ── -->
  <div id="header">

    <!-- Clock widget -->
    <div class="panel" id="clock-panel">
      <div class="label">System ClockSSSSSTEST</div>
      <div id="clock">00:00:00</div>
      <div id="date-str">Loading…</div>
      <div class="live-indicator">
        <span class="dot"></span>
        <span id="refresh-status">Online</span>
      </div>
    </div>

    <!-- Weather widget -->
    <div class="panel" id="weather-panel">
      <div class="label">Weather Report</div>
      <div id="weather-body">
        <div class="state-msg">
          <div class="spinner"></div>
          <span>Fetching conditions…</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Cybersecurity news feed ── -->
  <div class="panel" id="feeds-section">
    <div id="feeds-header">
      <div class="label">Cybersecurity Feed</div>
      <div id="feed-controls">

        <!-- Source filter dropdown -->
        <div id="source-dropdown">
          <button id="source-toggle">
            <span id="source-toggle-label">All Sources</span>
            <span id="source-toggle-chevron">&#9662;</span>
          </button>
          <div id="source-menu" hidden><!-- populated by news.js --></div>
        </div>

        <!-- Day navigation -->
        <div id="day-nav">
          <button class="day-nav-btn" id="nav-prev" title="Previous day">&#8249;</button>
          <span id="day-label"></span>
          <button class="day-nav-btn" id="nav-next" title="Next day" disabled>&#8250;</button>
        </div>

      </div>
    </div>

    <!-- Single merged article list -->
    <ul id="feed-merged">
      <li class="state-msg"><div class="spinner"></div><span>Loading…</span></li>
    </ul>
  </div>

  <!-- ── Footer ── -->
  <div id="footer">
    <span class="dot" style="width:5px;height:5px;animation-duration:3.5s"></span>
    <span id="last-updated">Initializing…</span>
  </div>

</div>

<!-- JS loaded in dependency order; all share the global scope -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/clock.js"></script>
<script src="js/weather.js"></script>
<script src="js/news.js"></script>
<script src="js/main.js"></script>
</body>
</html>
